<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Edda Network</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0a;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'Inter',-apple-system,sans-serif}
.box{display:flex;flex-direction:column;align-items:center;gap:16px}
input[type=password]{background:#111;border:1px solid rgba(255,255,255,.1);color:#fff;padding:13px 18px;border-radius:10px;font-size:15px;width:260px;outline:none;text-align:center;letter-spacing:2px}
input[type=password]:focus{border-color:rgba(255,255,255,.25)}
input[type=password]::placeholder{letter-spacing:0;color:#444}
button{background:#fff;color:#000;border:none;padding:13px 0;border-radius:10px;font-size:14px;font-weight:600;width:260px;cursor:pointer}
button:hover{background:#e0e0e0}
.err{color:#f87171;font-size:13px;display:none}
</style>
</head>
<body>
<div class="box">
  <input type="password" id="pw" placeholder="Password" autofocus/>
  <button onclick="check()">Enter</button>
  <span class="err" id="err">Wrong password</span>
</div>
<script>
async function check(){
  var v=document.getElementById('pw').value;
  var r=await fetch('/auth/login',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({password:v})
  });
  if(r.ok){
    window.location.href='/';
  } else {
    document.getElementById('err').style.display='block';
    document.getElementById('pw').value='';
    document.getElementById('pw').focus();
  }
}
document.getElementById('pw').addEventListener('keydown',function(e){if(e.key==='Enter')check()});
</script>
</body>
</html>
