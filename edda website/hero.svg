<svg viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg" width="1920" height="1080">
  <defs>
    <!-- Background grid pattern -->
    <pattern id="grid-fine" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.3" stroke-opacity="0.04"/>
    </pattern>
    <pattern id="grid-coarse" width="200" height="200" patternUnits="userSpaceOnUse">
      <path d="M 200 0 L 0 0 0 200" fill="none" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.07"/>
    </pattern>

    <!-- Noise texture filter -->
    <filter id="noise" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="overlay" result="blend"/>
      <feComposite in="blend" in2="SourceGraphic" operator="in"/>
    </filter>

    <!-- Glow for green accent -->
    <filter id="glow-green" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Clip paths -->
    <clipPath id="canvas-clip">
      <rect width="1920" height="1080"/>
    </clipPath>
  </defs>

  <g clip-path="url(#canvas-clip)">

    <!-- Base background -->
    <rect width="1920" height="1080" fill="#070707"/>

    <!-- Subtle vignette -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0d0d0d" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.7"/>
    </radialGradient>

    <!-- Grid layers -->
    <rect width="1920" height="1080" fill="url(#grid-fine)"/>
    <rect width="1920" height="1080" fill="url(#grid-coarse)"/>

    <!-- Horizontal scan lines (very subtle) -->
    <g opacity="0.025">
      <line x1="0" y1="200" x2="1920" y2="200" stroke="#fff" stroke-width="1"/>
      <line x1="0" y1="400" x2="1920" y2="400" stroke="#fff" stroke-width="1"/>
      <line x1="0" y1="540" x2="1920" y2="540" stroke="#fff" stroke-width="1"/>
      <line x1="0" y1="680" x2="1920" y2="680" stroke="#fff" stroke-width="1"/>
      <line x1="0" y1="880" x2="1920" y2="880" stroke="#fff" stroke-width="1"/>
    </g>

    <!-- LEFT: Large vertical coordinate markers -->
    <g fill="#ffffff" opacity="0.06" font-family="'Courier New', monospace" font-size="10" letter-spacing="1">
      <text x="36" y="120" transform="rotate(-90,36,120)">Y:0200</text>
      <text x="36" y="300" transform="rotate(-90,36,300)">Y:0400</text>
      <text x="36" y="480" transform="rotate(-90,36,480)">Y:0540</text>
      <text x="36" y="660" transform="rotate(-90,36,660)">Y:0680</text>
      <text x="36" y="840" transform="rotate(-90,36,840)">Y:0880</text>
    </g>

    <!-- RIGHT: Vertical coordinate markers -->
    <g fill="#ffffff" opacity="0.06" font-family="'Courier New', monospace" font-size="10" letter-spacing="1">
      <text x="1884" y="120" transform="rotate(90,1884,120)">Y:0200</text>
      <text x="1884" y="300" transform="rotate(90,1884,300)">Y:0400</text>
      <text x="1884" y="480" transform="rotate(90,1884,480)">Y:0540</text>
      <text x="1884" y="660" transform="rotate(90,1884,660)">Y:0680</text>
      <text x="1884" y="840" transform="rotate(90,1884,840)">Y:0880</text>
    </g>

    <!-- HASH STREAM (right side, vertical) -->
    <g font-family="'Courier New', monospace" font-size="9" fill="#ffffff" opacity="0.06" letter-spacing="0.5">
      <text x="1720" y="80">a3f8c2d1e4b7...</text>
      <text x="1720" y="100">09e1a5f3b8c4...</text>
      <text x="1720" y="120">7d2e9b4f1c6a...</text>
      <text x="1720" y="140">f5a3c8e2d1b9...</text>
      <text x="1720" y="160">2c7e4a9f8b3d...</text>
      <text x="1720" y="180">b1d6f2a5c9e8...</text>
      <text x="1720" y="200">4e8b3c7f2a1d...</text>
