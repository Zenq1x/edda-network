      <text x="1720" y="420">2e5a7f1c4b8d...</text>
      <text x="1720" y="440">b3d6c8e9f2a5...</text>
      <text x="1720" y="460">6c1a4d7b2e9f...</text>
      <text x="1720" y="480">9e7f3a8c1d4b...</text>
      <text x="1720" y="500">3b4d6e2f7c9a...</text>
      <text x="1720" y="520">a5c8f1b3d6e2...</text>
      <text x="1720" y="540">1d2e9a5c7f8b...</text>
      <text x="1720" y="560">8f3b4c1a6d9e...</text>
      <text x="1720" y="580">c7a2e5f9b4d3...</text>
      <text x="1720" y="600">5b9d3c8a2e1f...</text>
      <text x="1720" y="620">e4f6a1d2c8b7...</text>
      <text x="1720" y="640">2a1c7e9d4f8b...</text>
      <text x="1720" y="660">7d5b2f3a8c9e...</text>
      <text x="1720" y="680">f1e8d4b6c3a2...</text>
      <text x="1720" y="700">4c6a9e7f2d1b...</text>
      <text x="1720" y="720">b8d3f5c1a4e7...</text>
      <text x="1720" y="740">9e2c6b4d8f1a...</text>
      <text x="1720" y="760">3a7f1e9c5b2d...</text>
      <text x="1720" y="780">1b4c8a3e6f9d...</text>
      <text x="1720" y="800">d6e9b7c2f4a5...</text>
      <text x="1720" y="820">5f2a4d1e8c3b...</text>
      <text x="1720" y="840">8c3d6b9a7e1f...</text>
      <text x="1720" y="860">2e1f3c5d4b6a...</text>
      <text x="1720" y="880">a4b7e8f2d9c1...</text>
      <text x="1720" y="900">6d9c1a3e5f8b...</text>
      <text x="1720" y="920">b5f4d8c2a7e3...</text>
      <text x="1720" y="940">7a6e2b9f1c4d...</text>
      <text x="1720" y="960">4c8b5a7d2e6f...</text>
      <text x="1720" y="980">e3d1f9b6a8c2...</text>
      <text x="1720" y="1000">9b7a4c1e3f5d...</text>
      <text x="1720" y="1020">1f6e8d5c2b4a...</text>
      <text x="1720" y="1040">3a2c7f8e1d9b...</text>
      <text x="1720" y="1060">c8d4a6b3f7e2...</text>
    </g>

    <!-- Hash stream LEFT side -->
    <g font-family="'Courier New', monospace" font-size="9" fill="#ffffff" opacity="0.05" letter-spacing="0.5">
      <text x="60" y="80">...e7b4c1f9a2d8</text>
      <text x="60" y="100">...3d8e5a2b9f1c</text>
      <text x="60" y="120">...9c3f7d1a4e6b</text>
      <text x="60" y="140">...b2a8e4c7f3d1</text>
      <text x="60" y="160">...5f1d9b3c6e8a</text>
      <text x="60" y="180">...1e7c4a8b2f5d</text>
      <text x="60" y="200">...8b5f2d1e9c3a</text>
      <text x="60" y="220">...4a9e6c8f1b7d</text>
      <text x="60" y="240">...d6f3b9e4a1c2</text>
      <text x="60" y="260">...7c1a5f8d3b9e</text>
      <text x="60" y="280">...2e4d7c9b6a1f</text>
      <text x="60" y="300">...f8b6e1d4c7a9</text>
      <text x="60" y="320">...3d2f5a8b1e6c</text>
      <text x="60" y="340">...9a7c3f1d2e4b</text>
      <text x="60" y="360">...6b4e9a5c8f2d</text>
      <text x="60" y="380">...1c8b2d6e3f7a</text>
      <text x="60" y="400">...e3a5f1c9d4b8</text>
      <text x="60" y="420">...8f1d4e7a2c3b</text>
      <text x="60" y="440">...4c9a6b3d1e5f</text>
      <text x="60" y="460">...b5e2c8f4a7d1</text>
    </g>

    <!-- BLOCKCHAIN NODES (right area) -->
    <g opacity="0.12">
      <!-- Nodes -->
      <rect x="1540" y="320" width="80" height="44" rx="4" fill="none" stroke="#ffffff" stroke-width="0.8"/>
      <rect x="1540" y="420" width="80" height="44" rx="4" fill="none" stroke="#ffffff" stroke-width="0.8"/>
      <rect x="1540" y="520" width="80" height="44" rx="4" fill="none" stroke="#ffffff" stroke-width="0.8"/>
      <rect x="1540" y="620" width="80" height="44" rx="4" fill="none" stroke="#ffffff" stroke-width="0.8"/>
      <rect x="1540" y="720" width="80" height="44" rx="4" fill="none" stroke="#ffffff" stroke-width="0.8"/>
      <!-- Chain connectors -->
      <line x1="1580" y1="364" x2="1580" y2="420" stroke="#ffffff" stroke-width="0.8"/>
      <line x1="1580" y1="464" x2="1580" y2="520" stroke="#ffffff" stroke-width="0.8"/>
      <line x1="1580" y1="564" x2="1580" y2="620" stroke="#ffffff" stroke-width="0.8"/>
      <line x1="1580" y1="664" x2="1580" y2="720" stroke="#ffffff" stroke-width="0.8"/>
      <!-- Block numbers -->
      <text x="1580" y="347" text-anchor="middle" font-family="'Courier New', monospace" font-size="9" fill="#ffffff">#7291</text>
      <text x="1580" y="447" text-anchor="middle" font-family="'Courier New', monospace" font-size="9" fill="#ffffff">#7292</text>
      <text x="1580" y="547" text-anchor="middle" font-family="'Courier New', monospace" font-size="9" fill="#ffffff">#7293</text>
      <text x="1580" y="647" text-anchor="middle" font-family="'Courier New', monospace" font-size="9" fill="#ffffff">#7294</text>
      <text x="1580" y="747" text-anchor="middle" font-family="'Courier New', monospace" font-size="9" fill="#ffffff">#7295</text>
    </g>

    <!-- GREEN ACCENT: live block indicator -->
    <g filter="url(#glow-green)">
      <rect x="1540" y="320" width="80" height="44" rx="4" fill="none" stroke="#4ade80" stroke-width="1" opacity="0.8"/>
      <text x="1580" y="347" text-anchor="middle" font-family="'Courier New', monospace" font-size="9" fill="#4ade80">#7291</text>
      <circle cx="1540" cy="320" r="3" fill="#4ade80" opacity="0.9"/>
    </g>

    <!-- TOP BAR: technical header -->
    <g opacity="0.18" font-family="'Courier New', monospace" font-size="10" fill="#ffffff" letter-spacing="2">
      <text x="120" y="52">EDDA_NETWORK_V0.4</text>
      <text x="500" y="52">POH:ACTIVE</text>
      <text x="700" y="52">BFT:CONFIRMED</text>
      <text x="940" y="52">VALIDATORS:3</text>
      <text x="1160" y="52">SLOT:000719</text>
      <text x="1380" y="52">TPS:65000</text>
      <text x="1600" y="52">NET:TESTNET</text>
    </g>
    <line x1="120" y1="60" x2="1800" y2="60" stroke="#ffffff" stroke-width="0.4" opacity="0.1"/>

    <!-- BOTTOM BAR -->
    <line x1="120" y1="1020" x2="1800" y2="1020" stroke="#ffffff" stroke-width="0.4" opacity="0.1"/>
    <g opacity="0.14" font-family="'Courier New', monospace" font-size="10" fill="#ffffff" letter-spacing="1.5">
      <text x="120" y="1042">BLOCK_TIME:400ms</text>
      <text x="400" y="1042">FEE:0.000005_EDDA</text>
      <text x="700" y="1042">SUPPLY:500,000,000_MAX</text>
      <text x="1040" y="1042">BURN:50%</text>
      <text x="1200" y="1042">REWARD:10_EDDA_PER_BLOCK</text>
      <text x="1560" y="1042">eddachain.com</text>
    </g>

    <!-- MAIN TITLE: EDDA -->
    <!-- Massive background EDDA (very faint, structural) -->
    <text x="110" y="820" font-family="'Arial Black', 'Impact', sans-serif" font-size="680" font-weight="900"
          fill="none" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.03" letter-spacing="-20">EDDA</text>

    <!-- Primary EDDA text -->
    <text x="112" y="700" font-family="'Arial Black', 'Impact', sans-serif" font-size="520" font-weight="900"
          fill="#ffffff" opacity="0.94" letter-spacing="-15">EDDA</text>

    <!-- NETWORK subtitle -->
    <text x="120" y="760" font-family="'Courier New', monospace" font-size="28" fill="#ffffff" opacity="0.25" letter-spacing="22">NETWORK</text>

    <!-- Thin divider line under NETWORK -->
    <line x1="120" y1="780" x2="900" y2="780" stroke="#ffffff" stroke-width="0.5" opacity="0.12"/>

    <!-- TAGLINE -->
    <text x="122" y="832" font-family="'Courier New', monospace" font-size="16" fill="#ffffff" opacity="0.35" letter-spacing="4">PROOF OF HISTORY  ·  65,000 TPS  ·  400ms FINALITY</text>

    <!-- STATS BLOCK (lower left) -->
    <g transform="translate(120, 900)">
      <!-- Stat 1 -->
      <line x1="0" y1="0" x2="0" y2="60" stroke="#ffffff" stroke-width="0.5" opacity="0.2"/>
      <text x="16" y="18" font-family="'Arial Black', sans-serif" font-size="32" font-weight="900" fill="#ffffff" opacity="0.9">65,000</text>
      <text x="16" y="38" font-family="'Courier New', monospace" font-size="11" fill="#ffffff" opacity="0.35" letter-spacing="2">TRANSACTIONS/SEC</text>

      <!-- Stat 2 -->
      <line x1="220" y1="0" x2="220" y2="60" stroke="#ffffff" stroke-width="0.5" opacity="0.2"/>
      <text x="236" y="18" font-family="'Arial Black', sans-serif" font-size="32" font-weight="900" fill="#ffffff" opacity="0.9">400ms</text>
      <text x="236" y="38" font-family="'Courier New', monospace" font-size="11" fill="#ffffff" opacity="0.35" letter-spacing="2">BLOCK TIME</text>

      <!-- Stat 3 -->
      <line x1="420" y1="0" x2="420" y2="60" stroke="#ffffff" stroke-width="0.5" opacity="0.2"/>
      <text x="436" y="18" font-family="'Arial Black', sans-serif" font-size="32" font-weight="900" fill="#ffffff" opacity="0.9">500M</text>
      <text x="436" y="38" font-family="'Courier New', monospace" font-size="11" fill="#ffffff" opacity="0.35" letter-spacing="2">MAX SUPPLY</text>

      <!-- Stat 4 -->
      <line x1="620" y1="0" x2="620" y2="60" stroke="#ffffff" stroke-width="0.5" opacity="0.2"/>
      <text x="636" y="18" font-family="'Arial Black', sans-serif" font-size="32" font-weight="900" fill="#4ade80" opacity="0.95" filter="url(#glow-green)">~$0</text>
      <text x="636" y="38" font-family="'Courier New', monospace" font-size="11" fill="#4ade80" opacity="0.5" letter-spacing="2">FEE PER TX</text>
    </g>

    <!-- Vignette overlay -->
    <rect width="1920" height="1080" fill="url(#vignette)"/>

    <!-- Green dot (logo mark) -->
    <circle cx="120" cy="540" r="5" fill="#4ade80" opacity="0.7" filter="url(#glow-green)"/>
    <line x1="120" y1="548" x2="120" y2="890" stroke="#4ade80" stroke-width="0.8" opacity="0.15"/>

